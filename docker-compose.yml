version: '3.8'

services:
  agent:
    build: ./agent
    container_name: vet_voice_agent
    env_file:
      - ./agent/.env
    restart: unless-stopped

  web:
    build: ./web
    container_name: vet_voice_web
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env.local
    restart: unless-stopped